name: Mutation Testing

on:
  pull_request:
    branches: [ main ]

jobs:
  incremental-mutants:
    name: Incremental Mutants
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Compute diff against base branch
      run: |
        git diff origin/${{ github.base_ref }}.. | tee git.diff
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install cargo-mutants
      uses: taiki-e/install-action@cargo-mutants
    - name: Run mutants on the diff
      run: |
        set +e
        cargo mutants --no-shuffle -vV --in-diff git.diff
        code=$?
        set -e
        # Exit codes other than success (0), missed (2), and timeout (3) are
        # hard failures such as a bad invocation or a failing baseline build.
        if [ "$code" -ne 0 ] && [ "$code" -ne 2 ] && [ "$code" -ne 3 ]; then
          echo "cargo-mutants failed with exit code $code"
          exit "$code"
        fi
        # Fail only on surviving mutants. Timeouts are intrinsic to stateful
        # iterators (a mutated state update makes a consumer loop forever) and
        # are not real test gaps, so a timeout-only run is allowed to pass.
        if [ -s mutants.out/missed.txt ]; then
          echo "Surviving mutants found:"
          cat mutants.out/missed.txt
          exit 1
        fi
    - name: Archive mutants results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: mutants-incremental.out
        path: mutants.out
