name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, beta, nightly]
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2
    - name: Run tests (default features)
      run: cargo test --workspace
    - name: Run tests (all features)
      run: cargo test --workspace --all-features

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: rustfmt
    - name: Check formatting
      run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Run clippy
      run: cargo clippy --all-features --all-targets -- -D warnings

  features:
    name: Feature Compatibility
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install cargo-hack
      uses: taiki-e/install-action@cargo-hack
    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2
    - name: Compile-check every feature combination
      run: cargo hack --feature-powerset --no-dev-deps check
    - name: Test MemSize no-default smoke test
      run: cargo test --no-default-features --features mem_size test_mem_size_derives
    - name: Test MemDbg smoke test
      run: cargo test --no-default-features --features mem_dbg test_mem_dbg_derives

  msrv:
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust 1.88 (declared MSRV)
      uses: dtolnay/rust-toolchain@1.88.0
    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2
    - name: Check workspace builds on the MSRV toolchain
      run: cargo check --workspace --all-features

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Check documentation
      run: cargo doc --no-deps --document-private-items
      env:
        RUSTDOCFLAGS: -D warnings

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: llvm-tools-preview, rustfmt
    - name: Install tarpaulin
      uses: taiki-e/install-action@cargo-tarpaulin
    - name: Generate coverage
      run: cargo tarpaulin --engine=llvm --out xml --all-features --workspace --run-types AllTargets --run-types Doctests --exclude elements-builder
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
